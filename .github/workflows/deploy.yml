name: Deploy to Production (Vercel + Render)

# Vercel và Render đều được kết nối trực tiếp với GitHub.
# Chỉ cần push lên nhánh main là cả 2 nền tảng tự động deploy.
# Workflow này chỉ dùng để build check & xác nhận code hợp lệ.

on:
  push:
    branches:
      - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend (Vercel check)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://idaz.com.vn
          NEXT_PUBLIC_API_URL: https://idaz.com.vn/api
          NEXT_PUBLIC_SOCKET_URL: https://idaz.com.vn
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install --production

      - name: Syntax Check Backend
        working-directory: ./backend
        run: node --check server.js && echo "✅ Backend syntax OK"

      - name: Deploy Summary
        run: |
          echo "=========================================="
          echo "✅ Build check passed!"
          echo ""
          echo "🚀 Deployment is handled automatically by:"
          echo "   - Frontend: Vercel (idaz.com.vn)"
          echo "   - Backend:  Render (api.idaz.com.vn)"
          echo ""
          echo "Both platforms auto-deploy on push to main."
          echo "=========================================="
